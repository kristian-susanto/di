<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding / Event Invitation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f4f1ea;
        font-family: "Georgia", serif;
      }
      .hero-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="container hero-section">
      <div
        class="card p-5 shadow-lg border-0 rounded-4 max-width"
        style="max-width: 600px; background: #fff"
      >
        <p class="text-muted tracking-wide">YOU ARE CORDIALLY INVITED TO</p>
        <h1 class="display-5 my-3 text-secondary">{{ invite.title }}</h1>
        <hr class="w-25 mx-auto" />
        <p class="mt-4 fs-5">Dear, <strong>{{ invite.guest_name }}</strong></p>
        <p>We would love for you to join us celebrating this special moment.</p>
        <div class="bg-light p-3 my-4 rounded">
          <h5 class="mb-1">Save The Date</h5>
          <p class="mb-0 fw-bold text-dark">{{ invite.date }}</p>
        </div>
        <p class="text-muted small">Thank You</p>
      </div>
    </div>
  </body>
</html>
