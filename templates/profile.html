{% extends 'base.html' %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div class="row justify-content-center my-4">
    <div class="col-md-6 col-sm-10">
        <div class="card shadow-sm border-0 rounded-3 p-4 bg-white mb-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold text-dark">Profile Settings</h3>
                <p class="text-muted small">Update your account information data regularly</p>
            </div>

            <form id="profileForm" action="{{ url_for('profile') }}" method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" id="username" class="form-control" value="superadminaja" placeholder="Enter username">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" id="email" class="form-control" value="superadmin@gmail.com" placeholder="Enter email address">
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label">New Password (Leave blank if you don't want to change it)</label>
                    <div class="input-group">
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter password">
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="bi bi-eye-slash" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Save Button -->
                <button type="submit" class="btn btn-primary w-100 mt-3">Save Changes</button>
            </form>
        </div>

        <div class="card shadow-sm border-1 border-danger rounded-3 p-4 bg-white">
            <h5 class="fw-bold text-danger mb-2">🔴 Danger Zone</h5>
            <p class="text-muted small mb-3">Once you delete an account, all data associated with this account will be permanently lost and cannot be recovered.</p>
            <button type="button" id="btnDeleteAccount" class="btn btn-outline-danger w-100 py-2 fw-semibold">
                Delete My Account
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('togglePassword');
        const toggleIcon = document.getElementById('toggleIcon');
        const profileForm = document.getElementById('profileForm');

        // 1. Password Visibility Toggle Logic
        togglePasswordBtn.addEventListener('click', function () {
            // Check current input type
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Change eye icon (open/close)
            toggleIcon.classList.toggle('bi-eye');
            toggleIcon.classList.toggle('bi-eye-slash');
        });

        // 2. SweetAlert Confirm Selection Logic
        profileForm.addEventListener('submit', function (e) {
            // Stop the auto-submit form first
            e.preventDefault();

            Swal.fire({
                title: 'Are you sure?',
                text: "Your profile data will be updated!",
                icon: 'warning',
                showCloseButton: true,
                showCancelButton: true,
                confirmButtonColor: '#0d6efd',
                cancelButtonColor: '#6c757d'
            }).then((result) => {
                if (result.isConfirmed) {
                    profileForm.submit();
                }
            });
        });
    });

    document.getElementById('btnDeleteAccount').addEventListener('click', function() {
        Swal.fire({
            title: 'Are you sure?',
            text: "Your account will be permanently deleted and you will be automatically logged out of the system!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Processing...',
                    text: 'Currently deleting your account from the database.',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                // Send a request to the backend to delete data using the Fetch API
                fetch("{{ url_for('delete_account') }}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        Swal.fire({
                            icon: 'success',
                            title: 'Successfully Deleted!',
                            text: data.message,
                            confirmButtonText: 'OK'
                        }).then(() => {
                            // Redirect to login page after successful deletion
                            window.location.href = "{{ url_for('login') }}";
                        });
                    } else {
                        Swal.fire('Gagal!', 'There was a problem deleting the account.', 'error');
                    }
                })
                .catch(err => {
                    Swal.fire('Error!', 'Unable to connect to server.', 'error');
                });
            }
        });
    });
</script>

{% endblock %}
