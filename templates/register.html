{% extends 'base.html' %} {% block content %}
<div
  class="row justify-content-center align-items-center"
  style="min-height: 75vh"
>
  <div class="col-md-5 col-sm-8">
    <div class="card shadow border-0 rounded-3 p-4 bg-white">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-dark">Create Account</h2>
        <p class="text-muted small">
          Register to manage your digital invitations
        </p>
      </div>

      <form action="{{ url_for('register') }}" method="POST">
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold text-secondary"
            >Username</label
          >
          <input
            type="text"
            name="username"
            id="username"
            class="form-control"
            placeholder="Enter username"
            required
          />
        </div>

        <div class="mb-3">
          <label for="email" class="form-label fw-semibold text-secondary"
            >Email Address</label
          >
          <input
            type="email"
            name="email"
            id="email"
            class="form-control"
            placeholder="Enter email address"
            required
          />
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-semibold text-secondary"
            >Password</label
          >
          <input
            type="password"
            name="password"
            id="password"
            class="form-control"
            placeholder="Enter password"
            required
          />
        </div>

        <div class="mb-4">
          <label for="role" class="form-label fw-semibold text-secondary"
            >Select Account Role</label
          >
          <select name="role" id="role" class="form-select" required>
            <option value="" disabled selected>-- Choose Role --</option>
            <option value="user">User (Standard Guest/Client)</option>
            <option value="usher">Usher (Event Assistant)</option>
            <option value="admin">Admin</option>
            <option value="superadmin">Superadmin</option>
          </select>
          <div class="form-text text-muted small">
            Note: Role selection is available for development testing.
          </div>
        </div>

        <button type="submit" class="btn btn-success w-100 py-2 mb-3">
          Sign Up
        </button>
      </form>

      <div class="text-center mt-2">
        <p class="text-muted small mb-0">
          Already have an account?
          <a href="{{ url_for('login') }}" class="text-decoration-none"
            >Login here</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
