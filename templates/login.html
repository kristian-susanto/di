{% extends 'base.html' %} {% block content %}
<div
  class="row justify-content-center align-items-center"
  style="min-height: 75vh"
>
  <div class="col-md-5 col-sm-8">
    <div class="card shadow border-0 rounded-3 p-4 bg-white">
      <div class="text-center mb-4">
        <h2 class="fw-bold text-dark">Welcome Back</h2>
        <p class="text-muted small">Please enter your credentials to log in</p>
      </div>

      <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold text-secondary"
            >Email Address</label
          >
          <input
            type="email"
            name="email"
            id="email"
            class="form-control"
            placeholder="name@example.com"
            required
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold text-secondary"
            >Password</label
          >
          <input
            type="password"
            name="password"
            id="password"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
          Sign In
        </button>
      </form>

      <div class="text-center mt-2">
        <p class="text-muted small mb-0">
          Don't have an account?
          <a href="{{ url_for('register') }}" class="text-decoration-none"
            >Register here</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
